name: Daily Expat News Bot

on:
  schedule:
    # Her gün Türkiye saatiyle sabah 11:00'de çalışır (08:00 UTC)
    - cron: '0 */12 * * *'
  workflow_dispatch: # Manuel olarak "Actions" sekmesinden başlatabilmen için

permissions:
  # Dosyayı güncelleyip geri yükleyebilmesi için yazma izni şart
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Kütüphanelerin her seferinde sıfırdan yüklenmemesi için

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run News Bot
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python news_bot.py

      - name: Commit and Push Changes
        # Bu hazır paket, "rejected" hatalarını ve git ayarlarını otomatik halleder
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Daily news update: $(date +'%d-%m-%Y')"
          file_pattern: 'daily_news.json'
          # Eğer GitHub'da dosya değişmişse önce çekip sonra birleştirir
          push_options: '--force' 
          skip_dirty_check: false
