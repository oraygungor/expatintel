<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expat Haber Bülteni</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f1f5f9;
        }
        .news-card {
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .news-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
        }
        .tab-active {
            border-bottom: 2px solid #3b82f6;
            color: #3b82f6;
        }
        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <header class="mb-6 text-center">
            <h1 class="text-4xl font-bold mb-2 bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
                Expat Haber Bülteni
            </h1>
            <p id="status-text" class="text-slate-500 text-sm italic">Haberler yükleniyor...</p>
        </header>

        <!-- Filtreleme Alanı -->
        <div class="bg-slate-800/40 border border-slate-700 rounded-xl p-4 mb-6">
            <div class="flex flex-col md:flex-row items-end justify-center gap-4">
                <div class="w-full md:w-auto">
                    <label class="block text-xs font-semibold text-slate-400 mb-1 uppercase tracking-wider">Başlangıç Tarihi</label>
                    <input type="date" id="start-date" onchange="applyFilters()" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 text-white">
                </div>
                <div class="w-full md:w-auto">
                    <label class="block text-xs font-semibold text-slate-400 mb-1 uppercase tracking-wider">Bitiş Tarihi</label>
                    <input type="date" id="end-date" onchange="applyFilters()" class="w-full bg-slate-700 border border-slate-600 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 text-white">
                </div>
                <button onclick="resetFilters()" class="w-full md:w-auto px-4 py-2 text-sm bg-slate-600 hover:bg-slate-500 rounded-lg transition-colors">
                    Sıfırla
                </button>
            </div>
        </div>

        <!-- Sekme Navigasyonu -->
        <div class="flex border-b border-slate-700 mb-6 justify-center">
            <button id="tab-visual-btn" class="px-6 py-2 font-medium transition-colors tab-active" onclick="switchTab('visual')">
                Görsel Liste
            </button>
            <button id="tab-markdown-btn" class="px-6 py-2 font-medium text-slate-400 hover:text-slate-200 transition-colors" onclick="switchTab('markdown')">
                Link Listesi
            </button>
        </div>

        <!-- Görsel Liste Sekmesi -->
        <div id="tab-visual" class="space-y-4">
            <div id="news-container">
                <div class="flex justify-center items-center py-20">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500"></div>
                </div>
            </div>
        </div>

        <!-- Markdown (Saf Link) Sekmesi -->
        <div id="tab-markdown" class="hidden">
            <div class="bg-slate-900 border border-slate-700 rounded-xl p-6 relative">
                <button onclick="copyToClipboard()" class="absolute top-4 right-4 bg-slate-700 hover:bg-slate-600 text-xs px-3 py-1 rounded transition-colors flex items-center gap-1">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    Kopyala
                </button>
                <pre id="markdown-container" class="text-slate-300 font-mono text-sm leading-relaxed"></pre>
            </div>
        </div>

        <footer class="mt-12 text-center text-slate-600 text-xs">
            <p>&copy; 2026 Haber İzleyici - Veriler daily_news.json üzerinden senkronize edilir.</p>
        </footer>
    </div>

    <script>
        // Veri kaynağı
        const JSON_FILE_PATH = 'https://oraygungor.github.io/expatintel/daily_news.json'; 

        // DOM Element Değişkenleri (Hata buradaydı, tanımlanmamışlardı)
        const container = document.getElementById('news-container');
        const markdownContainer = document.getElementById('markdown-container');
        const statusText = document.getElementById('status-text');

        let allNews = [];

        // Yedek veri (Yükleme hatası durumunda)
        const fallbackData = {
            "haberler": [
                {
                    "baslik": "Danimarka'da vatandaşlık başvuruları neredeyse tamamen askıya alındı",
                    "kaynak": "The Local Denmark",
                    "link": "https://www.thelocal.dk/20260309/denmark-suspends-almost-all-citizenship-applications",
                    "tarih": "09.03.2026",
                    "sebep": "Danimarka'da vatandaşlık işlemlerinin durdurulması, ülkede yaşayan expat'lar için vatandaşlık alma süreçlerini etkileyebilir.",
                    "expat_puani": 9
                }
            ]
        };

        function switchTab(tab) {
            const visualTab = document.getElementById('tab-visual');
            const markdownTab = document.getElementById('tab-markdown');
            const visualBtn = document.getElementById('tab-visual-btn');
            const markdownBtn = document.getElementById('tab-markdown-btn');

            if (tab === 'visual') {
                visualTab.classList.remove('hidden');
                markdownTab.classList.add('hidden');
                visualBtn.classList.add('tab-active');
                visualBtn.classList.remove('text-slate-400');
                markdownBtn.classList.remove('tab-active');
                markdownBtn.classList.add('text-slate-400');
            } else {
                visualTab.classList.add('hidden');
                markdownTab.classList.remove('hidden');
                markdownBtn.classList.add('tab-active');
                markdownBtn.classList.remove('text-slate-400');
                visualBtn.classList.remove('tab-active');
                visualBtn.classList.add('text-slate-400');
            }
        }

        function parseTurkishDate(dateStr) {
            if (!dateStr) return new Date();
            const parts = dateStr.split('.');
            if (parts.length === 3) {
                return new Date(parts[2], parts[1] - 1, parts[0]);
            }
            return new Date(dateStr);
        }

        function applyFilters() {
            const startDate = document.getElementById('start-date').value;
            const endDate = document.getElementById('end-date').value;

            const filtered = allNews.filter(haber => {
                const haberDate = parseTurkishDate(haber.tarih);
                if (startDate) {
                    const start = new Date(startDate);
                    start.setHours(0,0,0,0);
                    if (haberDate < start) return false;
                }
                if (endDate) {
                    const end = new Date(endDate);
                    end.setHours(23,59,59,999);
                    if (haberDate > end) return false;
                }
                return true;
            });
            renderNews(filtered);
        }

        function resetFilters() {
            document.getElementById('start-date').value = '';
            document.getElementById('end-date').value = '';
            renderNews(allNews);
        }

        function renderNews(newsItems) {
            if (!container) return; // Güvenlik kontrolü
            
            container.innerHTML = '';
            let plainLinks = '';
            
            if (newsItems.length === 0) {
                container.innerHTML = '<p class="text-center text-slate-500 py-10">Kriterlere uygun haber bulunamadı.</p>';
                if (markdownContainer) markdownContainer.textContent = '';
                return;
            }

            newsItems.forEach(haber => {
                const score = haber.expat_puani !== undefined ? haber.expat_puani : (haber.puan || 0);
                
                plainLinks += `${haber.link}\n`;
                const card = document.createElement('div');
                card.className = 'news-card bg-slate-800/50 border border-slate-700 p-6 rounded-xl flex flex-col gap-4 mb-4';
                
                const scoreColor = score >= 9 ? 'bg-amber-500/20 text-amber-400' : 'bg-blue-500/20 text-blue-400';

                card.innerHTML = `
                    <div class="flex flex-col md:flex-row md:items-start justify-between gap-4">
                        <div class="flex-1">
                            <div class="flex flex-wrap items-center gap-2 mb-3">
                                <span class="${scoreColor} px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-tight">
                                    EXPAT PUANI: ${score}
                                </span>
                                <span class="bg-slate-700/50 text-slate-300 px-2 py-0.5 rounded text-[10px] font-medium uppercase tracking-tight">
                                    ${haber.kaynak || 'Kaynak Belirtilmemiş'}
                                </span>
                                <span class="text-slate-500 text-xs ml-auto">${haber.tarih || 'Tarih Belirtilmemiş'}</span>
                            </div>
                            <h2 class="text-xl font-bold text-slate-100 mb-2 leading-tight">
                                <a href="${haber.link}" target="_blank" rel="noopener noreferrer" class="hover:text-blue-400 transition-colors">
                                    ${haber.baslik || 'Başlıksız Haber'}
                                </a>
                            </h2>
                            ${haber.sebep ? `
                                <div class="bg-slate-900/40 border-l-2 border-blue-500/50 p-3 mt-3">
                                    <p class="text-sm text-slate-400 italic font-light">
                                        <span class="text-blue-400 font-semibold not-italic text-xs uppercase mr-1">Neden önemli:</span> 
                                        ${haber.sebep}
                                    </p>
                                </div>
                            ` : ''}
                        </div>
                        <div class="flex items-center md:self-center">
                            <a href="${haber.link}" target="_blank" rel="noopener noreferrer" 
                               class="w-full md:w-auto text-center bg-blue-600 hover:bg-blue-500 text-white px-6 py-2.5 rounded-lg text-sm font-semibold transition-all shadow-lg shadow-blue-900/20">
                                Haberi Oku
                            </a>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });

            if (markdownContainer) markdownContainer.textContent = plainLinks.trim();
            if (statusText) statusText.textContent = `${newsItems.length} haber listeleniyor`;
        }

        function copyToClipboard() {
            if (!markdownContainer) return;
            const text = markdownContainer.textContent;
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                const copyBtn = document.querySelector('#tab-markdown button');
                const originalContent = copyBtn.innerHTML;
                copyBtn.textContent = 'Kopyalandı!';
                copyBtn.classList.replace('bg-slate-700', 'bg-emerald-600');
                setTimeout(() => {
                    copyBtn.innerHTML = originalContent;
                    copyBtn.classList.replace('bg-emerald-600', 'bg-slate-700');
                }, 2000);
            } catch (err) { console.error(err); }
            document.body.removeChild(textArea);
        }

        async function init() {
            try {
                const response = await fetch(JSON_FILE_PATH);
                if (!response.ok) throw new Error('Dosya bulunamadı');
                const data = await response.json();
                allNews = data.haberler || [];
                renderNews(allNews);
            } catch (error) {
                console.warn(`Veri okunamadı, yedek veri yükleniyor.`);
                allNews = fallbackData.haberler;
                renderNews(allNews);
            }
        }

        window.onload = init;
    </script>
</body>
</html>
